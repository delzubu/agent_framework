<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
    <script defer src="{{ '/assets/site.js' | relative_url }}"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="site-title" href="{{ '/' | relative_url }}">agent_framework</a>
      <nav class="top-nav" aria-label="Primary">
        <a href="{{ '/learn/' | relative_url }}">Learn</a>
        <a href="{{ '/build/' | relative_url }}">Build</a>
        <a href="{{ '/reference/' | relative_url }}">Reference</a>
        <a href="{{ '/examples/' | relative_url }}">Examples</a>
        <a href="{{ '/community/' | relative_url }}">Community</a>
      </nav>
    </header>

    <main class="page-shell">
      <aside class="side-nav" aria-label="Documentation navigation">
        {% if page.sdk_page %}
          {% include sdk-navigation.html %}
        {% else %}
          {% include site-navigation.html %}
        {% endif %}
      </aside>

      <article class="content">
        {{ content }}
      </article>
    </main>
  </body>
</html>
