<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Evaluator</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div id="app">
    <aside id="left-rail">
      <h1>Agent Evaluator</h1>
      <label>Agent
        <input id="agent-select" type="text" list="agent-list" placeholder="agent id" autocomplete="off">
        <datalist id="agent-list"></datalist>
      </label>
      <label>Setup File <input id="setup-path" type="text" placeholder="optional path/to/setup.py"></label>
      <label>Mode <select id="mode-select"><option>Single Run</option><option>Test Set</option></select></label>
    </aside>
    <main id="main-pane">
      <section id="prompt-pane">
        <h2>Prompt</h2>
        <textarea id="prompt-input"></textarea>
        <button id="run-button" type="button">Run</button>
      </section>
      <section id="response-pane">
        <h2>Response</h2>
        <div id="response-output"></div>
      </section>
    </main>
    <aside id="trace-pane">
      <h2>Trace</h2>
      <div id="trace-controls" class="trace-controls">
        <div class="channel-toggles" id="channel-toggles">
          <label><input type="checkbox" id="ch-runtime" data-channel="runtime" checked> runtime</label>
          <label><input type="checkbox" id="ch-llm" data-channel="llm" checked> llm</label>
          <label><input type="checkbox" id="ch-log" data-channel="log" checked> log</label>
          <label><input type="checkbox" id="ch-user" data-channel="user" checked> user</label>
        </div>
      </div>
      <div id="trace-split">
        <section class="trace-span-section">
          <h3>Spans</h3>
          <div id="trace-tree"></div>
        </section>
        <section class="trace-log-section">
          <h3>Logs</h3>
          <div id="log-strip" aria-live="polite"></div>
        </section>
      </div>
    </aside>
  </div>
  <section id="reserved-testset-pane">
    <h2>Test Set</h2>
    <p>Reserved for future batch scoring and result summaries.</p>
  </section>
  <dialog id="trace-detail-modal" class="trace-detail-dialog">
    <div class="trace-detail-dialog-surface">
      <header class="trace-detail-dialog-header">
        <h3 id="trace-detail-modal-title" class="trace-detail-dialog-title"></h3>
        <button type="button" class="trace-detail-dialog-x" id="trace-detail-modal-close" aria-label="Close">×</button>
      </header>
      <div class="trace-detail-dialog-tabs" id="trace-detail-dialog-tabs" hidden>
        <button type="button" class="trace-detail-tab trace-detail-tab--active" data-panel="source" id="trace-detail-tab-source">Source</button>
        <button type="button" class="trace-detail-tab" data-panel="md" id="trace-detail-tab-md">Markdown</button>
      </div>
      <div class="trace-detail-dialog-body">
        <pre id="trace-detail-modal-source" class="trace-detail-panel trace-detail-panel--active trace-detail-dialog-pre"></pre>
        <div id="trace-detail-modal-md" class="trace-detail-panel trace-detail-md-body"></div>
      </div>
    </div>
  </dialog>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="/static/app.js"></script>
</body>
</html>
