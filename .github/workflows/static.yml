name: Deploy docs/pages to GitHub Pages

on:
  push:
    branches: ["master"]
    paths:
      - "docs/pages/**"   # only trigger when this folder changes
      - "docs/sdk-source/**"
      - "docs/sdk-overlays/**"
      - "src/**"
      - "scripts/generate_sphinx_sdk_stubs.py"
      - "pyproject.toml"
      - ".github/workflows/static.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SDK documentation dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[docs,dial,mcp,web]"

      - name: Build SDK documentation
        run: |
          rm -rf docs/pages/sdk
          python scripts/generate_sphinx_sdk_stubs.py
          sphinx-build -b html docs/sdk-source docs/pages/sdk

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: docs/pages
          destination: _site

      - name: Restore prebuilt SDK output
        run: |
          sudo rm -rf _site/sdk
          sudo cp -R docs/pages/sdk _site/sdk
          sudo chown -R "$USER:$USER" _site/sdk

      - name: Verify deployed docs paths
        run: |
          test -f _site/start-here/what-is-agent_framework/index.html
          test -f _site/build/getting-started/index.html
          test -f _site/reference/sdk-reference/index.html
          test -f _site/sdk/index.html
          if grep -R -n "{{ '/' | relative_url }}" _site; then
            echo "Found unresolved Liquid placeholders in built site"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
